name: PowerShell Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse PowerShell files
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Path . -Filter '*.ps1' -File -Recurse | ForEach-Object {
              $tokens = $null
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $_.FullName,
                  [ref]$tokens,
                  [ref]$errors
              ) | Out-Null

              if ($errors.Count -gt 0) {
                  $failed = $true
                  Write-Host "Parser errors in $($_.FullName)" -ForegroundColor Red
                  $errors | ForEach-Object { Write-Host $_ -ForegroundColor Red }
              }
          }

          if ($failed) {
              throw 'PowerShell parser validation failed.'
          }

      - name: Run PSScriptAnalyzer errors
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $findings = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($findings) {
              $findings | Format-Table -AutoSize | Out-String | Write-Host
              throw 'PSScriptAnalyzer reported one or more errors.'
          }
