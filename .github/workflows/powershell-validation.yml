name: PowerShell Validation

on:
  push:
    paths:
      - '**.ps1'
      - '.github/workflows/powershell-validation.yml'
  pull_request:
    paths:
      - '**.ps1'
      - '.github/workflows/powershell-validation.yml'

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter *.ps1 -Recurse | ForEach-Object {
              $tokens = $null
              $errors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile(
                  $_.FullName,
                  [ref]$tokens,
                  [ref]$errors
              )

              if ($errors.Count -gt 0) {
                  $failed = $true
                  Write-Host "Syntax errors in $($_.FullName)" -ForegroundColor Red
                  $errors | ForEach-Object { Write-Host $_.Message -ForegroundColor Red }
              }
              else {
                  Write-Host "Syntax valid: $($_.Name)" -ForegroundColor Green
              }
          }

          if ($failed) {
              exit 1
          }
